[tips-and-tricks-item-description]
arig-briefing=[planet=arig] — горячая планета с обширными пустынями, где ценные ресурсы можно найти только под землёй или в [tile=arig-sand], используя [entity=offshore-pump]. Постоянные песчаные бури делают использование [entity=roboport] практически невозможным, а большая часть поверхности непригодна для строительства без [item=planetaris-sandstone-foundation].\nБазовые ресурсы можно получать, просеивая [fluid=planetaris-sand] в [entity=planetaris-sifter].\nНенужные предметы можно утилизировать, выбрасывая их прямо на [tile=arig-sand].\nСбросы грузовых капсул на этой планете заблокированы, пока не будет выполнено соответствующее исследование (кроме [item=construction-robot]).

