[technology-description]
planet-discovery-arig=Горячая планета с огромными пустынями, где ценные ресурсы можно найти только под землёй или в песке. Постоянные песчаные бури делают использование роботов практически невозможным, а большая часть поверхности непригодна для строительства без специального фундамента. (Внимание: сбросы грузовых капсул на этой планете заблокированы, пока не будет выполнено соответствующее исследование.)
planetaris-cactus-wood=Позволяет получать древесину из кактусов.
planetaris-sand-sifting=Позволяет просеивать песок Ариг, получая базовые ресурсы.
planetaris-raw-diamond-production=Позволяет сжимать необработанные алмазы.
planetaris-compression=Позволяет сжимать материалы, создавая новые.
planetaris-glass=Позволяет производить стекло.
planetaris-heavy-glass=Позволяет производить тяжёлое стекло.
planetaris-compression-science=Открывает дополнительные исследования, связанные со сжатием.
planetaris-advanced-sand-sifting=Позволяет просеивать кальцит и более чистый песок.
planetaris-sandstone-foundation=Позволяет строить на песках Ариг.
planetaris-simulating-unit=Позволяет создавать модули симуляции.
planetaris-big-chest=Увеличивает объём хранилищ для предметов и логистических систем.
planetaris-Logistics-4=Более быстрые конвейеры.
planetaris-automation-4=Более быстрый сборочный автомат.
planetaris-arig-roboport=Позволяет строить пылезащищённые робопорты на Ариг.
planetaris-advanced-solar-panel=В два раза эффективнее базовой солнечной панели.
planetaris-supported-solar-panel=Солнечная панель и малый столб ЛЭП, предназначенные для установки над жидкостями и на нестабильную поверхность.
planetaris-water-harvesting=Машина, способная получать воду из влажности атмосферы.

