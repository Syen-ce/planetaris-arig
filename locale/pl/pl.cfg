[tips-and-tricks-item-description]
arig-briefing=[planet=arig] to gorąca planeta z rozległymi pustyniami, gdzie cenne zasoby kryją się pod ziemią lub w [tile=arig-sand] i można je pozyskiwać przy użyciu [entity=offshore-pump]. Nieustanne burze piaskowe uniemożliwiają korzystanie z [entity=roboport], a większość terenu wymaga [item=planetaris-sandstone-foundation] przed rozpoczęciem budowy.\nPodstawowe zasoby można uzyskać, przesiewając [fluid=planetaris-sand] w [entity=planetaris-sifter].\nNiepotrzebne przedmioty można usuwać, wrzucając je bezpośrednio do [tile=arig-sand].\nZrzuty ładunku są zablokowane do czasu zbadania odpowiedniej technologii (z wyjątkiem [item=construction-robot]).
arig-exploring=Czasami poruszanie się po piasku jest wyjątkowo uciążliwe - pamiętaj, że jedzenie kaktusów pozwala szybciej się poruszać! Tylko uważaj na kolce.
rail-support-deep-sand=Po zbadaniu [technology=rail-support-foundations] możesz stawiać podpory estakad kolejowych na [tile=arig-deep-sand].

[factoriopedia-description]
condensing-cactus=\nZebranie [entity=planetaris-cactus-plant] kondensuje 1500 [fluid=water] (115/sekundę)

