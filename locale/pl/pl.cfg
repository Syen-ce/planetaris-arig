planetaris-compression=Pozwala wytwarzać nowe materiały przy użyciu prasy hydraulicznej
planetaris-glass=Pozwala na wytwarzanie szklanych płytek
planetaris-heavy-glass=Pozwala na wytwarzanie ciężkiego szkła
planetaris-compression-science=Pozwala na zgłębianie wiedzy o procesie kompresji materiałów
planetaris-advanced-sand-sifting=Pozwala na przesiewanie kalcytu oraz czystszego piasku
planetaris-sandstone-foundation=Pozwala budować konstrukcje na arigijskich piaskach
planetaris-simulating-unit=Pozwala na wytwarzanie układów symulujących
planetaris-big-chest=Większa przestrzeń magazynowa
planetaris-Logistics-4=Szybsze i wygodniejsze sposoby transportu
