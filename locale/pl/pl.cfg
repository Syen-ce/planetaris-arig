[tips-and-tricks-item-description]
arig-briefing=[planet=arig] to gorąca planeta z rozległymi pustyniami, gdzie cenne zasoby można znaleźć tylko pod ziemią lub w [tile=arig-sand] przy użyciu [entity=offshore-pump]. Ciągłe burze piaskowe uniemożliwiają korzystanie z [entity=roboport], a większość powierzchni nie nadaje się do budowania bez [item=planetaris-sandstone-foundation].\nPodstawowe zasoby można uzyskać poprzez przesiewanie [fluid=planetaris-sand] w [entity=planetaris-sifter]\nMożliwe jest usuwanie odpadów poprzez przenoszenie ich bezpośrednio do [tile=arig-sand].\nDostawy ładunków są zablokowane na planecie do czasu opracowania odpowiedniej technologii (z wyjątkiem [item=construction-robot])
arig-exploring=Czasami chodzenie po piasku jest bardzo trudne, pamiętaj, że zjedzenie kaktusa to świetny sposób na przyspieszenie! Tylko uważaj na kolce.
rail-support-deep-sand= Po opracowaniu [technology=rail-support-foundations] można budować podpory kolejowe na [tile=arig-deep-sand]

